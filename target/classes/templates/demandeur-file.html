<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiche du Demandeur - Sprint 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
        }

        .container-file {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card-file {
            background: white;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .card-header-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            color: white;
            text-align: center;
        }

        .card-header-custom h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .card-body-custom {
            padding: 40px;
        }

        .file-grid {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .photo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .photo-frame {
            width: 200px;
            height: 250px;
            background: #f0f0f0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-placeholder {
            text-align: center;
            color: #999;
        }

        .photo-placeholder i {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .info-section {
            display: flex;
            flex-direction: column;
        }

        .info-block {
            margin-bottom: 25px;
        }

        .info-label {
            font-size: 11px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .signature-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 30px;
            border: 2px solid #e0e0e0;
            margin-top: 30px;
        }

        .signature-section h3 {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .signature-section h3 i {
            margin-right: 10px;
            color: #667eea;
        }

        .signature-frame {
            background: white;
            border: 2px dashed #e0e0e0;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signature-frame img {
            max-width: 100%;
            max-height: 150px;
        }

        .signature-placeholder {
            color: #999;
        }

        .signature-placeholder i {
            font-size: 36px;
            display: block;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn-custom {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary-custom {
            background: #f0f1ff;
            color: #667eea;
        }

        .btn-secondary-custom:hover {
            background: #e8e9ff;
        }

        .badge-custom {
            display: inline-block;
            padding: 6px 12px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .file-grid {
                grid-template-columns: 1fr;
            }

            .photo-frame {
                width: 150px;
                height: 200px;
                margin: 0 auto 15px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn-custom {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container-file">
        <div class="card-file">
            <!-- Header -->
            <div class="card-header-custom">
                <h1><i class="fas fa-user-circle"></i> Fiche du Demandeur</h1>
                <p>Profil complet avec photo et signature</p>
            </div>

            <!-- Body -->
            <div class="card-body-custom">
                <span class="badge-custom"><i class="fas fa-check-circle"></i> Profil Complet</span>

                <!-- Main Section -->
                <div class="file-grid">
                    <!-- Photo -->
                    <div class="photo-section">
                        <div class="photo-frame" th:if="${demandeurFile.photoData}">
                            <img th:src="${demandeurFile.photoData}" alt="Photo">
                        </div>
                        <div class="photo-frame" th:unless="${demandeurFile.photoData}">
                            <div class="photo-placeholder">
                                <i class="fas fa-camera"></i>
                                <p>Pas de photo</p>
                            </div>
                        </div>
                    </div>

                    <!-- Information -->
                    <div class="info-section">
                        <div class="info-block">
                            <div class="info-label">Nom Complet</div>
                            <div class="info-value" th:text="${demandeurFile.prenom} + ' ' + ${demandeurFile.nom}"></div>
                        </div>

                        <div class="info-block">
                            <div class="info-label">Date de Naissance</div>
                            <div class="info-value" th:text="${demandeurFile.dateNaissance}"></div>
                        </div>

                        <div class="info-block">
                            <div class="info-label">Lieu de Naissance</div>
                            <div class="info-value" th:text="${demandeurFile.lieuNaissance}"></div>
                        </div>

                        <div class="info-block">
                            <div class="info-label">Nationalité</div>
                            <div class="info-value" th:text="${demandeurFile.nationalite}"></div>
                        </div>

                        <div class="info-block">
                            <div class="info-label">Situation Familiale</div>
                            <div class="info-value" th:text="${demandeurFile.situationFamiliale}"></div>
                        </div>

                        <div class="info-block">
                            <div class="info-label">Téléphone</div>
                            <div class="info-value" th:text="${demandeurFile.telephone}"></div>
                        </div>

                        <div class="info-block">
                            <div class="info-label">Email</div>
                            <div class="info-value" th:text="${demandeurFile.email}"></div>
                        </div>

                        <div class="info-block">
                            <div class="info-label">Adresse</div>
                            <div class="info-value" th:text="${demandeurFile.adresse}"></div>
                        </div>
                    </div>
                </div>

                <!-- Signature Section -->
                <div class="signature-section">
                    <h3>
                        <i class="fas fa-pen-fancy"></i> Signature
                    </h3>
                    <div class="signature-frame" th:if="${demandeurFile.signatureData}">
                        <img th:src="${demandeurFile.signatureData}" alt="Signature">
                    </div>
                    <div class="signature-frame" th:unless="${demandeurFile.signatureData}">
                        <div class="signature-placeholder">
                            <i class="fas fa-pen"></i>
                            <p>Pas de signature</p>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="btn-custom btn-primary-custom" onclick="printFile()">
                        <i class="fas fa-print"></i> Imprimer
                    </button>
                    <button class="btn-custom btn-secondary-custom" 
                            th:onclick="'location.href=\\'/backoffice/photo-signature/capture/' + ${demandeurFile.id} + '\\';\n'">
                        <i class="fas fa-redo"></i> Mettre à Jour
                    </button>
                    <a href="/backoffice/dashboard" class="btn-custom btn-secondary-custom">
                        <i class="fas fa-home"></i> Tableau de Bord
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function printFile() {
            window.print();
        }
    </script>
</body>
</html>
