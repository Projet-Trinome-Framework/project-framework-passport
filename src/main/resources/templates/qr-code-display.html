<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - Sprint 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card-qr {
            background: white;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
            padding: 50px;
            max-width: 500px;
            text-align: center;
        }
        
        .qr-code-container {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 30px;
            margin: 30px 0;
            border: 2px solid #e0e0e0;
        }
        
        .qr-code-image {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
        }
        
        .qr-info {
            background: #f0f1ff;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            border-left: 4px solid #667eea;
        }
        
        .qr-info p {
            margin: 0;
            font-size: 13px;
            color: #667eea;
        }
        
        .qr-title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }
        
        .qr-subtitle {
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        
        .btn-custom {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary-custom {
            background: #f0f1ff;
            color: #667eea;
        }
        
        .btn-secondary-custom:hover {
            background: #e8e9ff;
        }
    </style>
</head>
<body>
    <div class="card-qr">
        <h2 class="qr-title"><i class="fas fa-qrcode"></i> Code QR</h2>
        <p class="qr-subtitle">Demande #<span th:text="${demande.id}"></span></p>
        
        <div class="qr-code-container" th:if="${qrCode}">
            <img th:src="${qrCode.qrCodeImage}" class="qr-code-image" alt="QR Code">
        </div>
        
        <div class="qr-info">
            <p><strong>Demandeur:</strong></p>
            <p th:text="${qrCode.demandeurName}"></p>
        </div>
        
        <div class="qr-info">
            <p><strong>Token:</strong></p>
            <p style="font-family: monospace; word-break: break-all;" th:text="${qrCode.requestToken}"></p>
        </div>
        
        <div class="action-buttons">
            <button class="btn btn-custom btn-primary-custom" onclick="downloadQR()">
                <i class="fas fa-download"></i> Télécharger
            </button>
            <a href="/backoffice/dashboard" class="btn btn-custom btn-secondary-custom">
                <i class="fas fa-home"></i> Tableau de Bord
            </a>
        </div>
    </div>

    <script>
        function downloadQR() {
            const demandeId = [[${demande.id}]];
            const link = document.createElement('a');
            link.href = `/backoffice/qrcode/download/${demandeId}`;
            link.download = `qr_code_${demandeId}.png`;
            link.click();
        }
    </script>
</body>
</html>
