<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Photo et Signature - Sprint 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container-capture {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card-main {
            background: white;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .card-header-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            color: white;
            text-align: center;
        }

        .card-header-custom h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .card-body-custom {
            padding: 40px;
        }

        .capture-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .capture-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 30px;
            border: 2px solid #e0e0e0;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .section-title i {
            margin-right: 10px;
            color: #667eea;
        }

        .video-container {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            display: none;
        }

        .signature-canvas {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: crosshair;
            background: white;
            margin-bottom: 15px;
        }

        .canvas-placeholder {
            background: white;
            border: 2px dashed #e0e0e0;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            color: #999;
            margin-bottom: 15px;
        }

        .preview-image {
            width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .btn-group-capture {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-custom {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary-custom {
            background: #f0f1ff;
            color: #667eea;
            border: 1px solid #667eea;
        }

        .btn-secondary-custom:hover {
            background: #e8e9ff;
        }

        .btn-danger-custom {
            background: #ffebee;
            color: #d32f2f;
            border: 1px solid #d32f2f;
        }

        .btn-danger-custom:hover {
            background: #ffcdd2;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #e8f5e9;
            border-radius: 8px;
            color: #2e7d32;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        .status-indicator.active {
            display: flex;
        }

        .status-indicator i {
            margin-right: 8px;
        }

        .summary-section {
            background: #f0f1ff;
            border-radius: 16px;
            padding: 30px;
            border-left: 4px solid #667eea;
        }

        .summary-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-icon {
            font-size: 20px;
            color: #667eea;
            margin-right: 15px;
            min-width: 24px;
            text-align: center;
        }

        .summary-info h5 {
            margin: 0;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .summary-info p {
            margin: 0;
            color: #999;
            font-size: 12px;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 30px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        @media (max-width: 768px) {
            .capture-grid {
                grid-template-columns: 1fr;
            }

            .card-header-custom {
                padding: 30px 20px;
            }

            .card-body-custom {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container-capture">
        <div class="card-main">
            <!-- Header -->
            <div class="card-header-custom">
                <h1><i class="fas fa-camera"></i> Capture Photo & Signature</h1>
                <p>Complétez votre profil</p>
            </div>

            <!-- Body -->
            <div class="card-body-custom">
                <div class="capture-grid">
                    <!-- Photo Capture Section -->
                    <div>
                        <div class="capture-section">
                            <h4 class="section-title">
                                <i class="fas fa-camera"></i> Photo
                            </h4>
                            
                            <div class="video-container">
                                <video id="video" playsinline></video>
                                <canvas id="photo-canvas"></canvas>
                            </div>

                            <div id="photo-preview" class="canvas-placeholder" style="display: none;">
                                <img id="preview-img" class="preview-image">
                            </div>

                            <div class="btn-group-capture">
                                <button class="btn-custom btn-primary-custom" id="btn-start-camera" 
                                        onclick="startCamera()">
                                    <i class="fas fa-video"></i> Démarrer
                                </button>
                                <button class="btn-custom btn-secondary-custom" id="btn-capture-photo" 
                                        onclick="capturePhoto()" style="display: none;">
                                    <i class="fas fa-camera"></i> Prendre
                                </button>
                                <button class="btn-custom btn-danger-custom" id="btn-retake-photo" 
                                        onclick="retakePhoto()" style="display: none;">
                                    <i class="fas fa-redo"></i> Recommencer
                                </button>
                            </div>

                            <div class="status-indicator" id="photo-status">
                                <i class="fas fa-check-circle"></i>
                                Photo capturée
                            </div>
                        </div>
                    </div>

                    <!-- Signature Capture Section -->
                    <div>
                        <div class="capture-section">
                            <h4 class="section-title">
                                <i class="fas fa-pen-fancy"></i> Signature
                            </h4>

                            <div class="canvas-placeholder" style="border: 2px solid #667eea;">
                                <canvas id="signature-canvas" class="signature-canvas" 
                                        width="300" height="150"></canvas>
                            </div>

                            <div class="btn-group-capture">
                                <button class="btn-custom btn-secondary-custom" onclick="clearSignature()">
                                    <i class="fas fa-eraser"></i> Effacer
                                </button>
                                <button class="btn-custom btn-primary-custom" onclick="saveSignature()">
                                    <i class="fas fa-check"></i> Valider
                                </button>
                            </div>

                            <div class="status-indicator" id="signature-status">
                                <i class="fas fa-check-circle"></i>
                                Signature capturée
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Summary -->
                <div class="summary-section">
                    <h4 style="margin-bottom: 20px; color: #667eea; font-weight: 600;">
                        <i class="fas fa-list-check"></i> Statut
                    </h4>

                    <div class="summary-item">
                        <div class="summary-icon" id="photo-check">
                            <i class="fas fa-circle"></i>
                        </div>
                        <div class="summary-info">
                            <h5>Photo</h5>
                            <p id="photo-text">En attente</p>
                        </div>
                    </div>

                    <div class="summary-item">
                        <div class="summary-icon" id="signature-check">
                            <i class="fas fa-circle"></i>
                        </div>
                        <div class="summary-info">
                            <h5>Signature</h5>
                            <p id="signature-text">En attente</p>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button class="btn-submit" id="btn-final-submit" disabled>
                    <i class="fas fa-check-circle"></i> Finaliser l'Enregistrement
                </button>
            </div>
        </div>
    </div>

    <script>
        const demandeurId = [[${demandeurId}]];
        const demandeId = [[${demandeId}]] || null;
        
        let photoData = null;
        let signatureData = null;
        let stream = null;

        const videoElement = document.getElementById('video');
        const photoCanvas = document.getElementById('photo-canvas');
        const photoCtx = photoCanvas.getContext('2d');
        const signatureCanvas = document.getElementById('signature-canvas');
        const signCtx = signatureCanvas.getContext('2d');

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // Signature drawing events
        signatureCanvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = signatureCanvas.getBoundingClientRect();
            lastX = e.clientX - rect.left;
            lastY = e.clientY - rect.top;
        });

        signatureCanvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            
            const rect = signatureCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            signCtx.strokeStyle = '#333';
            signCtx.lineWidth = 2;
            signCtx.lineCap = 'round';
            signCtx.lineJoin = 'round';

            signCtx.beginPath();
            signCtx.moveTo(lastX, lastY);
            signCtx.lineTo(x, y);
            signCtx.stroke();

            lastX = x;
            lastY = y;
        });

        signatureCanvas.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        signatureCanvas.addEventListener('mouseout', () => {
            isDrawing = false;
        });

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                .then(s => {
                    stream = s;
                    videoElement.srcObject = stream;
                    videoElement.onloadedmetadata = () => {
                        videoElement.play();
                    };
                    document.getElementById('btn-start-camera').style.display = 'none';
                    document.getElementById('btn-capture-photo').style.display = 'block';
                });
        }

        function capturePhoto() {
            photoCanvas.width = videoElement.videoWidth;
            photoCanvas.height = videoElement.videoHeight;
            photoCtx.drawImage(videoElement, 0, 0);
            
            photoData = photoCanvas.toDataURL('image/png');
            document.getElementById('preview-img').src = photoData;
            document.getElementById('photo-preview').style.display = 'block';
            document.getElementById('video').style.display = 'none';

            document.getElementById('btn-capture-photo').style.display = 'none';
            document.getElementById('btn-retake-photo').style.display = 'block';
            document.getElementById('photo-status').classList.add('active');
            
            updateStatus('photo', true);

            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }

        function retakePhoto() {
            photoData = null;
            document.getElementById('photo-preview').style.display = 'none';
            document.getElementById('video').style.display = 'block';
            document.getElementById('btn-retake-photo').style.display = 'none';
            document.getElementById('btn-capture-photo').style.display = 'block';
            document.getElementById('photo-status').classList.remove('active');
            
            updateStatus('photo', false);
            startCamera();
        }

        function clearSignature() {
            signCtx.clearRect(0, 0, signatureCanvas.width, signatureCanvas.height);
            signatureData = null;
            document.getElementById('signature-status').classList.remove('active');
            updateStatus('signature', false);
        }

        function saveSignature() {
            signatureData = signatureCanvas.toDataURL('image/png');
            document.getElementById('signature-status').classList.add('active');
            updateStatus('signature', true);
        }

        function updateStatus(type, completed) {
            if (type === 'photo') {
                const check = document.getElementById('photo-check');
                const text = document.getElementById('photo-text');
                if (completed) {
                    check.innerHTML = '<i class="fas fa-check-circle" style="color: #2e7d32;"></i>';
                    text.textContent = 'Complétée';
                    text.style.color = '#2e7d32';
                } else {
                    check.innerHTML = '<i class="fas fa-circle"></i>';
                    text.textContent = 'En attente';
                    text.style.color = '#999';
                }
            } else if (type === 'signature') {
                const check = document.getElementById('signature-check');
                const text = document.getElementById('signature-text');
                if (completed) {
                    check.innerHTML = '<i class="fas fa-check-circle" style="color: #2e7d32;"></i>';
                    text.textContent = 'Complétée';
                    text.style.color = '#2e7d32';
                } else {
                    check.innerHTML = '<i class="fas fa-circle"></i>';
                    text.textContent = 'En attente';
                    text.style.color = '#999';
                }
            }

            if (photoData && signatureData) {
                document.getElementById('btn-final-submit').disabled = false;
            } else {
                document.getElementById('btn-final-submit').disabled = true;
            }
        }

        document.getElementById('btn-final-submit').addEventListener('click', () => {
            if (!photoData || !signatureData) return;

            // Save photo
            fetch(`/backoffice/photo-signature/photo/${demandeurId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `photoData=${encodeURIComponent(photoData)}&format=image/png` +
                      (demandeId ? `&demandeId=${demandeId}` : '')
            })
            .then(r => r.json())
            .then(data => console.log('Photo saved:', data));

            // Save signature
            fetch(`/backoffice/photo-signature/signature/${demandeurId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `signatureData=${encodeURIComponent(signatureData)}&format=image/png` +
                      (demandeId ? `&demandeId=${demandeId}` : '')
            })
            .then(r => r.json())
            .then(data => {
                console.log('Signature saved:', data);
                alert('Enregistrement complété avec succès!');
                window.location.href = `/backoffice/photo-signature/file/${demandeurId}`;
            });
        });
    </script>
</body>
</html>
